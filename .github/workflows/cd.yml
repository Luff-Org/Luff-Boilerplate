name: CD

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: luff-org/luff-boilerplate

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        include:
          - service: auth-service
            context: .
            dockerfile: backend/auth/Dockerfile
            image_name: auth-service
          - service: posts-service
            context: .
            dockerfile: backend/posts/Dockerfile
            image_name: posts-service
          - service: api-gateway
            context: .
            dockerfile: backend/api-gateway/Dockerfile
            image_name: api-gateway
          - service: frontend
            context: .
            dockerfile: frontend/Dockerfile
            image_name: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set lower case owner name
        id: owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ matrix.image_name }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_API_URL=https://api.your-domain.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        id: owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Update Image Tags
        run: |
          for service in auth-service posts-service api-gateway frontend; do
            sed -i "s|image: .*$service:.*|image: ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/$service:${{ github.sha }}|g" k8s/*.yaml
          done
        env:
          REGISTRY: ghcr.io

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/*.yaml
          git commit -m "chore: update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
